<?xml version="1.0" encoding="UTF-8"?>
<!--
  apartment.svg — two-bedroom apartment demonstrating all nine semantic categories:
    wall_outer_, wall_inner_, wall_balcony_,
    floor_slab_, door_wood_, door_glass_, sliding_door_,
    window_standard_, wardrobe_

  Canvas: 1000x600 px. Recommended base scale: 3 cm.
  Layout: outer boundary x=50,y=50 to x=725,y=550 (wall thickness 25 px).
    Bedroom (left):    x=75  to x=375, y=75 to y=525
    Living room (right): x=400 to x=700, y=75 to y=525
    Bathroom (SW of bedroom): x=75 to x=300, y=370 to y=525
    Balcony (east of living room): x=725 to x=950, y=170 to y=430
-->
<svg
   xmlns="http://www.w3.org/2000/svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   width="1000"
   height="600"
   viewBox="0 0 1000 600"
   inkscape:version="1.3 (0e150ed, 2023-07-21)"
   sodipodi:docname="apartment.svg">

  <sodipodi:namedview inkscape:document-units="px"/>

  <!-- ══════════════════ FLOOR SLABS ══════════════════ -->

  <g inkscape:groupmode="layer" inkscape:label="floor_slab_main" id="floor_slab_main">
    <!-- Interior floor covering bedroom + living room -->
    <rect id="floor_main" x="75" y="75" width="650" height="450"
          style="fill:#d4c5a9;stroke:none"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="floor_slab_balcony" id="floor_slab_balcony">
    <!-- Balcony deck between the two balcony parapet walls -->
    <rect id="floor_balcony" x="750" y="175" width="150" height="250"
          style="fill:#c8b89a;stroke:none"/>
  </g>

  <!-- ══════════════════ OUTER WALLS ══════════════════ -->

  <g inkscape:groupmode="layer" inkscape:label="wall_outer_north" id="wall_outer_north">
    <rect id="wall_n" x="50" y="50" width="675" height="25"
          style="fill:#888888;stroke:none"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="wall_outer_south" id="wall_outer_south">
    <rect id="wall_s" x="50" y="525" width="675" height="25"
          style="fill:#888888;stroke:none"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="wall_outer_west" id="wall_outer_west">
    <rect id="wall_w" x="50" y="50" width="25" height="500"
          style="fill:#888888;stroke:none"/>
  </g>

  <!-- East wall split into two segments (gap for sliding door to balcony) -->
  <g inkscape:groupmode="layer" inkscape:label="wall_outer_east_n" id="wall_outer_east_n">
    <rect id="wall_e_top" x="700" y="50" width="25" height="150"
          style="fill:#888888;stroke:none"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="wall_outer_east_s" id="wall_outer_east_s">
    <rect id="wall_e_bot" x="700" y="425" width="25" height="100"
          style="fill:#888888;stroke:none"/>
  </g>

  <!-- ══════════════════ INNER WALLS ══════════════════ -->

  <!-- Bedroom / living room divider (full-height partition) -->
  <g inkscape:groupmode="layer" inkscape:label="wall_inner_divider" id="wall_inner_divider">
    <rect id="inner_divider" x="375" y="75" width="25" height="450"
          style="fill:#aaaaaa;stroke:none"/>
  </g>

  <!-- Bathroom north wall -->
  <g inkscape:groupmode="layer" inkscape:label="wall_inner_bath_n" id="wall_inner_bath_n">
    <rect id="bath_wall_n" x="75" y="350" width="225" height="20"
          style="fill:#aaaaaa;stroke:none"/>
  </g>

  <!-- Bathroom east wall (has gap for bathroom door) -->
  <g inkscape:groupmode="layer" inkscape:label="wall_inner_bath_e_top" id="wall_inner_bath_e_top">
    <rect id="bath_wall_e1" x="280" y="370" width="20" height="85"
          style="fill:#aaaaaa;stroke:none"/>
  </g>

  <!-- ══════════════════ BALCONY PARAPET WALLS ══════════════════ -->

  <!-- North parapet of balcony -->
  <g inkscape:groupmode="layer" inkscape:label="wall_balcony_north" id="wall_balcony_north">
    <rect id="bal_wall_n" x="725" y="150" width="225" height="20"
          style="fill:#999999;stroke:none"/>
  </g>

  <!-- South parapet of balcony -->
  <g inkscape:groupmode="layer" inkscape:label="wall_balcony_south" id="wall_balcony_south">
    <rect id="bal_wall_s" x="725" y="430" width="225" height="20"
          style="fill:#999999;stroke:none"/>
  </g>

  <!-- East-most parapet wall -->
  <g inkscape:groupmode="layer" inkscape:label="wall_balcony_east" id="wall_balcony_east">
    <rect id="bal_wall_e" x="930" y="170" width="20" height="260"
          style="fill:#999999;stroke:none"/>
  </g>

  <!-- ══════════════════ DOORS ══════════════════ -->

  <!-- Front door on the west wall -->
  <g inkscape:groupmode="layer" inkscape:label="door_wood_entrance" id="door_wood_entrance">
    <rect id="door_front" x="50" y="280" width="25" height="100"
          style="fill:#7a4a1e;stroke:none"/>
  </g>

  <!-- Bedroom door in the inner divider wall -->
  <g inkscape:groupmode="layer" inkscape:label="door_wood_bedroom" id="door_wood_bedroom">
    <rect id="door_bed" x="375" y="230" width="25" height="85"
          style="fill:#7a4a1e;stroke:none"/>
  </g>

  <!-- Bathroom door (glass panel) -->
  <g inkscape:groupmode="layer" inkscape:label="door_glass_bathroom" id="door_glass_bathroom">
    <rect id="door_bath" x="280" y="455" width="70" height="20"
          style="fill:#aaddff;stroke:none"/>
  </g>

  <!-- Sliding door to the balcony -->
  <g inkscape:groupmode="layer" inkscape:label="sliding_door_balcony" id="sliding_door_balcony">
    <rect id="door_sliding" x="700" y="200" width="25" height="225"
          style="fill:#88bbdd;stroke:none"/>
  </g>

  <!-- ══════════════════ WINDOWS ══════════════════ -->

  <!-- Bedroom window on the north wall -->
  <g inkscape:groupmode="layer" inkscape:label="window_standard_bedroom" id="window_standard_bedroom">
    <rect id="win_bed" x="120" y="50" width="130" height="25"
          style="fill:#aaddff;stroke:none"/>
  </g>

  <!-- Living room window on the north wall -->
  <g inkscape:groupmode="layer" inkscape:label="window_standard_living" id="window_standard_living">
    <rect id="win_liv" x="490" y="50" width="130" height="25"
          style="fill:#aaddff;stroke:none"/>
  </g>

  <!-- Bathroom window on the south wall -->
  <g inkscape:groupmode="layer" inkscape:label="window_standard_bathroom" id="window_standard_bathroom">
    <rect id="win_bath" x="110" y="525" width="80" height="25"
          style="fill:#aaddff;stroke:none"/>
  </g>

  <!-- ══════════════════ FURNITURE ══════════════════ -->

  <!-- Built-in wardrobe in the bedroom (NW corner) -->
  <g inkscape:groupmode="layer" inkscape:label="wardrobe_bedroom" id="wardrobe_bedroom">
    <rect id="wardrobe" x="75" y="75" width="55" height="150"
          style="fill:#e8d5b0;stroke:none"/>
  </g>

</svg>
